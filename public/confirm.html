<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wyniki zapisane!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 24px;
    }

    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 36px 28px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .check {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 8px;
    }

    .match-info {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .score {
      font-size: 32px;
      font-weight: 900;
      color: #fff;
      margin: 4px 0;
    }

    .divider {
      height: 1px;
      background: #334155;
      margin: 24px 0;
    }

    .photo-label {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px 24px;
      background: #2563eb;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
      cursor: pointer;
    }

    .btn:active {
      background: #1d4ed8;
      transform: scale(0.98);
    }

    .btn-icon {
      font-size: 20px;
      margin-right: 8px;
    }

    .skip {
      display: block;
      margin-top: 14px;
      font-size: 13px;
      color: #475569;
      text-decoration: none;
    }

    .teams {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .team-name {
      font-size: 15px;
      font-weight: 600;
      color: #e2e8f0;
    }

    .vs {
      font-size: 12px;
      color: #475569;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <div class="title">Wyniki zapisane!</div>

    <div class="match-info" id="match-info">
      <!-- wypełniane przez JS -->
    </div>

    <div class="divider"></div>

    <div class="photo-label">📸 Dodaj zdjęcie z meczu</div>

    <a class="btn" id="editor-btn" href="#">
      <span class="btn-icon">🖼️</span>Otwórz edytor zdjęcia
    </a>

    <a class="skip" href="#">Pomiń — nie dodaję zdjęcia</a>
  </div>

  <script>
    const p = new URLSearchParams(window.location.search);

    const teamHome  = p.get('team_home')  || '';
    const teamAway  = p.get('team_away')  || '';
    const wynik     = p.get('wynik')      || '';
    const kolejka   = p.get('kolejka')    || '';
    const editorUrl = p.get('editor_url') || '';

    // Wypełnij info o meczu
    const info = document.getElementById('match-info');
    if (teamHome && teamAway) {
      info.innerHTML = `
        <div class="teams">
          <span class="team-name">${teamHome}</span>
          <span class="vs">vs</span>
          <span class="team-name">${teamAway}</span>
        </div>
        <div class="score">${wynik}</div>
        ${kolejka ? `<div style="font-size:12px;color:#475569;margin-top:4px">${kolejka}</div>` : ''}
      `;
    } else {
      info.innerHTML = '<span style="color:#475569">Grafiki klasyczne zostały wygenerowane.</span>';
    }

    // Ustaw link do edytora
    const btn = document.getElementById('editor-btn');
    if (editorUrl) {
      btn.href = editorUrl;
    } else {
      btn.style.opacity = '0.4';
      btn.style.pointerEvents = 'none';
    }
  </script>
</body>
</html>
